<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arie AI - Modern Interface</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b0c10; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .phone-screen { width: 100%; max-width: 400px; height: 740px; background: #12141c; border-radius: 32px; border: 2px solid #232736; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 16px 48px rgba(0, 0, 0, 0.9); position: relative; }

        /* HEADER & AVATAR ARIE */
        .header-section { padding: 14px; display: flex; flex-direction: column; align-items: center; background: #0d0f14; border-bottom: 1px solid #1f2330; gap: 10px; }
        
        .bot-avatar-card { position: relative; width: 100%; height: 130px; border-radius: 20px; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #090a0d; --led-color1: #00f2fe; --led-color2: #4facfe; transition: all 0.5s ease; }
        .bot-avatar-card::before { content: ''; position: absolute; width: 180px; height: 360px; background: linear-gradient(0deg, transparent, var(--led-color1), var(--led-color2)); animation: rotateBorder 3.5s linear infinite; }

        .bot-face-inner { position: absolute; inset: 3px; background: #141722; border-radius: 17px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; z-index: 1; }
        .eyes-container { display: flex; gap: 32px; align-items: center; height: 28px; }
        .eye { width: 22px; height: 22px; background-color: #ffffff; border-radius: 50%; box-shadow: 0 0 12px rgba(255, 255, 255, 0.9); transition: all 0.3s ease; }
        .mouth { width: 24px; height: 12px; background-color: var(--led-color1); border-radius: 0 0 24px 24px; transition: transform 0.08s ease, background-color 0.3s ease; }

        /* EMOTIONS CONFIG */
        .bot-avatar-card[data-emotion="normal"] { --led-color1: #00f2fe; --led-color2: #4facfe; }
        .bot-avatar-card[data-emotion="happy"] { --led-color1: #00ff88; --led-color2: #00b894; }
        .bot-avatar-card[data-emotion="happy"] .eye { height: 12px; border-radius: 12px 12px 0 0; }
        .bot-avatar-card[data-emotion="sleepy"] { --led-color1: #a29bfe; --led-color2: #6c5ce7; }
        .bot-avatar-card[data-emotion="sleepy"] .eye { height: 6px; border-radius: 4px; }
        .bot-avatar-card[data-emotion="angry"] { --led-color1: #ff3838; --led-color2: #ff4d4d; }
        .bot-avatar-card[data-emotion="angry"] .eye { height: 8px; transform: rotate(15deg); }
        .bot-avatar-card[data-emotion="sad"] { --led-color1: #4a69bd; --led-color2: #1e3799; }
        .bot-avatar-card[data-emotion="sad"] .eye { height: 10px; border-radius: 0 0 10px 10px; }
        .bot-avatar-card[data-emotion="surprised"] { --led-color1: #fdcb6e; --led-color2: #e17055; }
        .bot-avatar-card[data-emotion="surprised"] .eye { width: 26px; height: 26px; }

        .bot-avatar-card.talking .mouth { transform: scaleY(var(--mouth-scale, 1)); }

        @keyframes rotateBorder { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* DẢI NÚT TEST EMOTIONS (THÊM MỚI) */
        .emotion-toolbar { display: flex; gap: 6px; overflow-x: auto; width: 100%; padding-bottom: 2px; }
        .emo-btn { background: #1c202e; border: 1px solid #282d3f; color: #a0a5b5; padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .emo-btn:hover { background: #00f2fe; color: #000; font-weight: bold; }

        /* CHAT HISTORY */
        .chat-history { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { max-width: 82%; padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .msg-user { align-self: flex-end; background: linear-gradient(135deg, #0052d4, #4364f7); color: #ffffff; border-bottom-right-radius: 4px; }
        .msg-bot { align-self: flex-start; background: #1c202e; color: #e1e6f0; border: 1px solid #282d3f; border-bottom-left-radius: 4px; }

        /* INPUT */
        .input-section { padding: 14px; background: #0d0f14; border-top: 1px solid #1f2330; display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #181b26; border: 1px solid #282d3f; border-radius: 22px; padding: 12px 16px; color: #ffffff; outline: none; }
        .send-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; width: 42px; height: 42px; border-radius: 50%; color: #000; font-weight: bold; cursor: pointer; }

        .status-badge { position: absolute; top: 8px; right: 12px; font-size: 10px; color: #00ff88; background: rgba(0, 0, 0, 0.6); padding: 3px 8px; border-radius: 10px; z-index: 2; }
    </style>
</head>
<body>

    <div class="phone-screen">
        <div class="header-section">
            <div class="bot-avatar-card" id="botCard" data-emotion="normal" style="--mouth-scale: 1;">
                <span class="status-badge" id="statusBadge">Connecting...</span>
                <div class="bot-face-inner">
                    <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>

            <!-- DẢI NÚT TEST EMOTIONS THỦ CÔNG -->
            <div class="emotion-toolbar">
                <button class="emo-btn" onclick="setEmotion('normal')">Normal</button>
                <button class="emo-btn" onclick="setEmotion('happy')">Happy</button>
                <button class="emo-btn" onclick="setEmotion('sleepy')">Sleepy</button>
                <button class="emo-btn" onclick="setEmotion('angry')">Angry</button>
                <button class="emo-btn" onclick="setEmotion('sad')">Sad</button>
                <button class="emo-btn" onclick="setEmotion('surprised')">Surprised</button>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="msg-bubble msg-bot" id="initMsg">🔌 Đang kiểm tra kết nối WebSocket Backend...</div>
        </div>

        <div class="input-section">
            <input type="text" id="userInput" class="chat-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        // Nếu chạy trên GitHub Pages không có server WebSocket thật, gán URL tĩnh hoặc thử kết nối
        const wsUrl = `${protocol}//${window.location.host}/ws/chat`;

        let ws = null;
        const botCard = document.getElementById('botCard');
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const statusBadge = document.getElementById('statusBadge');
        let currentBotBubble = null;

        try {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusBadge.innerText = "Online";
                statusBadge.style.color = "#00ff88";
                document.getElementById('initMsg').innerText = "⚡ Đã kết nối thành công với Python Core!";
            };

            ws.onerror = () => {
                setOfflineMode();
            };

            ws.onclose = () => {
                setOfflineMode();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "state_change") {
                    setEmotion(data.emotion);
                    if (data.is_talking) {
                        botCard.classList.add('talking');
                        currentBotBubble = document.createElement('div');
                        currentBotBubble.className = 'msg-bubble msg-bot';
                        chatHistory.appendChild(currentBotBubble);
                    } else {
                        botCard.classList.remove('talking');
                        currentBotBubble = null;
                    }
                } else if (data.type === "stream_chunk") {
                    if (currentBotBubble) currentBotBubble.innerText = data.text_chunk;
                    botCard.style.setProperty('--mouth-scale', data.mouth_scale_y);
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }
            };
        } catch (e) {
            setOfflineMode();
        }

        function setOfflineMode() {
            statusBadge.innerText = "Offline Mode";
            statusBadge.style.color = "#ffaa00";
            const initMsg = document.getElementById('initMsg');
            if (initMsg) {
                initMsg.innerText = "⚠️ Chưa kết nối Python Backend. Bạn có thể bấm các nút Emotion ở trên để xem hiệu ứng giao diện UI!";
            }
        }

        function setEmotion(emo) {
            botCard.setAttribute('data-emotion', emo);
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const userBubble = document.createElement('div');
            userBubble.className = 'msg-bubble msg-user';
            userBubble.innerText = text;
            chatHistory.appendChild(userBubble);

            userInput.value = '';

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(text);
            } else {
                // Giả lập trả lời khi ở Offline Mode
                setTimeout(() => {
                    const mockBubble = document.createElement('div');
                    mockBubble.className = 'msg-bubble msg-bot';
                    mockBubble.innerText = "Tớ đang ở Chế độ UI Preview (chưa bật Python Server). Bấm các nút Emotion ở trên để test giao diện nhé!";
                    chatHistory.appendChild(mockBubble);
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }, 400);
            }
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
