<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arie AI - Modern Interface</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* KHUNG MÀN HÌNH ĐIỆN THOẠI */
        .phone-screen {
            width: 100%;
            max-width: 400px;
            height: 720px;
            background: #12141c;
            border-radius: 32px;
            border: 2px solid #232736;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        /* HEADER & AVATAR ARIE */
        .header-section {
            padding: 16px;
            display: flex;
            justify-content: center;
            background: #0d0f14;
            border-bottom: 1px solid #1f2330;
        }

        .bot-avatar-card {
            position: relative;
            width: 100%;
            height: 140px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #090a0d;
            --led-color1: #00f2fe;
            --led-color2: #4facfe;
            transition: all 0.5s ease;
        }

        /* VIỀN LED XOAY QUANH AVATAR */
        .bot-avatar-card::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 360px;
            background: linear-gradient(0deg, transparent, var(--led-color1), var(--led-color2));
            animation: rotateBorder 3.5s linear infinite;
        }

        .bot-face-inner {
            position: absolute;
            inset: 3px;
            background: #141722;
            border-radius: 17px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            z-index: 1;
        }

        .eyes-container {
            display: flex;
            gap: 32px;
            align-items: center;
            height: 28px;
        }

        .eye {
            width: 22px;
            height: 22px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }

        .mouth {
            width: 24px;
            height: 12px;
            background-color: var(--led-color1);
            border-radius: 0 0 24px 24px;
            transition: transform 0.08s ease, background-color 0.3s ease;
        }

        /* HỆ THỐNG EMOTION */
        .bot-avatar-card[data-emotion="normal"] { --led-color1: #00f2fe; --led-color2: #4facfe; }
        .bot-avatar-card[data-emotion="happy"] { --led-color1: #00ff88; --led-color2: #00b894; }
        .bot-avatar-card[data-emotion="happy"] .eye { height: 12px; border-radius: 12px 12px 0 0; }

        .bot-avatar-card[data-emotion="sleepy"] { --led-color1: #a29bfe; --led-color2: #6c5ce7; }
        .bot-avatar-card[data-emotion="sleepy"] .eye { height: 6px; border-radius: 4px; }

        .bot-avatar-card[data-emotion="angry"] { --led-color1: #ff3838; --led-color2: #ff4d4d; }
        .bot-avatar-card[data-emotion="angry"] .eye { height: 8px; transform: rotate(15deg); }

        .bot-avatar-card[data-emotion="sad"] { --led-color1: #4a69bd; --led-color2: #1e3799; }
        .bot-avatar-card[data-emotion="sad"] .eye { height: 10px; border-radius: 0 0 10px 10px; }

        .bot-avatar-card[data-emotion="surprised"] { --led-color1: #fdcb6e; --led-color2: #e17055; }
        .bot-avatar-card[data-emotion="surprised"] .eye { width: 26px; height: 26px; }

        /* NHÚN NHẢY MIỆNG KHI SPEAKING */
        .bot-avatar-card.talking .mouth {
            transform: scaleY(var(--mouth-scale, 1));
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* KHUNG CHAT HISTORY */
        .chat-history {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-history::-webkit-scrollbar {
            width: 4px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: #232736;
            border-radius: 4px;
        }

        .msg-bubble {
            max-width: 82%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease-in-out;
        }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0052d4, #4364f7);
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .msg-bot {
            align-self: flex-start;
            background: #1c202e;
            color: #e1e6f0;
            border: 1px solid #282d3f;
            border-bottom-left-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* KHUNG NHẬP TIN NHẮN */
        .input-section {
            padding: 14px;
            background: #0d0f14;
            border-top: 1px solid #1f2330;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: #181b26;
            border: 1px solid #282d3f;
            border-radius: 22px;
            padding: 12px 16px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #00f2fe;
        }

        .send-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s active;
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .status-badge {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 10px;
            color: #00ff88;
            background: rgba(0, 0, 0, 0.6);
            padding: 3px 8px;
            border-radius: 10px;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        <div class="header-section">
            <div class="bot-avatar-card" id="botCard" data-emotion="normal" style="--mouth-scale: 1;">
                <span class="status-badge" id="statusBadge">Connecting...</span>
                <div class="bot-face-inner">
                    <div class="eyes-container">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="msg-bubble msg-bot">🔌 Đang kết nối tới Arie Python Engine qua WebSocket...</div>
        </div>

        <div class="input-section">
            <input type="text" id="userInput" class="chat-input" placeholder="Nhập tin nhắn cho Arie..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        // TỰ ĐỘNG PHÁT HIỆN PROTOCOL (ws:// hoặc wss://) CHO CODESPACES HOẶC LOCALHOST
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${protocol}//${window.location.host}/ws/chat`;

        const ws = new WebSocket(wsUrl);
        const botCard = document.getElementById('botCard');
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const statusBadge = document.getElementById('statusBadge');

        let currentBotBubble = null;

        ws.onopen = () => {
            console.log("WebSocket Connected successfully to:", wsUrl);
            statusBadge.innerText = "Online";
            statusBadge.style.color = "#00ff88";
            chatHistory.innerHTML = '<div class="msg-bubble msg-bot">⚡ Đã kết nối thành công với Python Core! Chào bạn, tớ là Arie.</div>';
        };

        ws.onerror = (error) => {
            console.error("WebSocket Error:", error);
            statusBadge.innerText = "Error";
            statusBadge.style.color = "#ff3838";
        };

        ws.onclose = () => {
            statusBadge.innerText = "Disconnected";
            statusBadge.style.color = "#ffaa00";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === "state_change") {
                // Đổi Emotion viền LED & Mắt
                botCard.setAttribute('data-emotion', data.emotion || 'normal');
                
                if (data.is_talking) {
                    botCard.classList.add('talking');
                    // Tạo bong bóng chat mới cho Bot khi bắt đầu stream text
                    currentBotBubble = document.createElement('div');
                    currentBotBubble.className = 'msg-bubble msg-bot';
                    chatHistory.appendChild(currentBotBubble);
                } else {
                    botCard.classList.remove('talking');
                    currentBotBubble = null;
                }
            } 
            else if (data.type === "stream_chunk") {
                // Nhận từng chữ gõ real-time & nhịp nhảy miệng từ Python
                if (currentBotBubble) {
                    currentBotBubble.innerText = data.text_chunk;
                }
                botCard.style.setProperty('--mouth-scale', data.mouth_scale_y);
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }
        };

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text || ws.readyState !== WebSocket.OPEN) return;

            // Hiển thị bong bóng tin nhắn của User
            const userBubble = document.createElement('div');
            userBubble.className = 'msg-bubble msg-user';
            userBubble.innerText = text;
            chatHistory.appendChild(userBubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            userInput.value = '';

            // Bắn text sang Python Backend qua WebSocket
            ws.send(text);
        }
    </script>
</body>
              </html>
