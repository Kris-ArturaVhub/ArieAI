<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arie AI Engine - Core System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #08090c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            overflow: hidden;
        }

        /* KHUNG MÀN HÌNH ĐIỆN THOẠI */
        .phone-screen {
            width: 100%;
            max-width: 410px;
            height: 740px;
            background: #11131a;
            border-radius: 36px;
            border: 2px solid #222634;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.95);
            position: relative;
        }

        /* HEADER & AVATAR ARIE COMPLEX UI */
        .header-section {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0a0b0f;
            border-bottom: 1px solid #1c1f2b;
            gap: 12px;
            position: relative;
        }

        .bot-avatar-card {
            position: relative;
            width: 100%;
            height: 50%;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #060709;
            --led-color1: #00f2fe;
            --led-color2: #4facfe;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* VIỀN LED CẦU PHỒNG XOAY QUANH AVATAR */
        .bot-avatar-card::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 400px;
            background: linear-gradient(0deg, transparent, var(--led-color1), var(--led-color2));
            animation: rotateBorder 3.2s linear infinite;
        }

        .bot-face-inner {
            position: absolute;
            inset: 3px;
            background: #131622;
            border-radius: 19px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            z-index: 1;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .eyes-container {
            display: flex;
            gap: 34px;
            align-items: center;
            height: 30px;
        }

        .eye {
            width: 24px;
            height: 24px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mouth {
            width: 26px;
            height: 13px;
            background-color: var(--led-color1);
            border-radius: 0 0 26px 26px;
            transition: transform 0.08s ease, background-color 0.3s ease, height 0.2s ease;
            box-shadow: 0 0 8px var(--led-color1);
        }

        /* EMOTION STATES ENGINE */
        .bot-avatar-card[data-emotion="normal"] { --led-color1: #00f2fe; --led-color2: #4facfe; }
        .bot-avatar-card[data-emotion="happy"] { --led-color1: #00ff88; --led-color2: #00b894; }
        .bot-avatar-card[data-emotion="happy"] .eye { height: 12px; border-radius: 12px 12px 0 0; }

        .bot-avatar-card[data-emotion="sleepy"] { --led-color1: #a29bfe; --led-color2: #6c5ce7; }
        .bot-avatar-card[data-emotion="sleepy"] .eye { height: 5px; border-radius: 3px; opacity: 0.7; }

        .bot-avatar-card[data-emotion="angry"] { --led-color1: #ff3838; --led-color2: #ff4d4d; }
        .bot-avatar-card[data-emotion="angry"] .eye { height: 8px; transform: rotate(18deg); }

        .bot-avatar-card[data-emotion="sad"] { --led-color1: #4a69bd; --led-color2: #1e3799; }
        .bot-avatar-card[data-emotion="sad"] .eye { height: 10px; border-radius: 0 0 10px 10px; }

        .bot-avatar-card[data-emotion="surprised"] { --led-color1: #fdcb6e; --led-color2: #e17055; }
        .bot-avatar-card[data-emotion="surprised"] .eye { width: 28px; height: 28px; }
        .bot-avatar-card[data-emotion="surprised"] .mouth { border-radius: 50%; height: 20px; width: 20px; }

        /* NHÚN NHẢY MIỆNG KHI NOÍ (TALKING ANIMATION) */
        .bot-avatar-card.talking .mouth {
            transform: scaleY(var(--mouth-scale, 1));
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* KHUNG CHAT HISTORY COMPLEX */
        .chat-history {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-history::-webkit-scrollbar {
            width: 5px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: #222634;
            border-radius: 5px;
        }

        .msg-bubble {
            max-width: 84%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.25s cubic-bezier(0, 0, 0.2, 1);
            position: relative;
        }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0052d4, #4364f7);
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 14px rgba(0, 82, 212, 0.3);
        }

        .msg-bot {
            align-self: flex-start;
            background: #1a1e2b;
            color: #e2e7f2;
            border: 1px solid #262b3c;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* KHUNG INPUT VÀ NÚT GỬI COMPLEX */
        .input-section {
            padding: 16px;
            background: #0a0b0f;
            border-top: 1px solid #1c1f2b;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: #161924;
            border: 1px solid #262a3a;
            border-radius: 24px;
            padding: 13px 18px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .chat-input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .send-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s active, box-shadow 0.2s;
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.4);
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        .status-badge {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 10px;
            color: #00ff88;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 10px;
            border-radius: 12px;
            z-index: 2;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        <div class="header-section">
            <div class="bot-avatar-card" id="botCard" data-emotion="normal" style="--mouth-scale: 1;">
                <span class="status-badge" id="statusBadge">AI Core Active</span>
                <div class="bot-face-inner">
                    <div class="eyes-container">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="msg-bubble msg-bot">⚡ Hệ thống Arie AI Core đã sẵn sàng! Chào bạn, tớ có thể giúp gì nào?</div>
        </div>

        <div class="input-section">
            <input type="text" id="userInput" class="chat-input" placeholder="Nhập tin nhắn cho Arie..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        // CONFIG GEMINI API KEY CHÍNH THỨC
        const GEMINI_API_KEY = "AQ.Ab8RN6IipupD9KXOP3Z-EVBmyevj_FqYCCFkXE11r2schnJhcQ";
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        const botCard = document.getElementById('botCard');
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const statusBadge = document.getElementById('statusBadge');

        function setEmotion(emo) {
            botCard.setAttribute('data-emotion', emo || 'normal');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Hiển thị bong bóng chat User
            const userBubble = document.createElement('div');
            userBubble.className = 'msg-bubble msg-user';
            userBubble.innerText = text;
            chatHistory.appendChild(userBubble);
            userInput.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // 2. Tạo bong bóng chat Bot đang suy nghĩ
            const botBubble = document.createElement('div');
            botBubble.className = 'msg-bubble msg-bot';
            botBubble.innerText = '...';
            chatHistory.appendChild(botBubble);

            statusBadge.innerText = "Thinking...";
            statusBadge.style.color = "#fdcb6e";

            try {
                // Prompt yêu cầu trả về JSON chuẩn
                const promptPayload = {
                    contents: [{
                        parts: [{
                            text: `Bạn là Arie AI - một trợ lý ảo cá tính.
                            Phản hồi câu nói sau của User: "${text}"
                            BẮT BUỘC trả về định dạng JSON thuần không bọc markdown codeblock:
                            {"reply_text": "câu trả lời", "emotion": "chọn 1 trong [normal, happy, sad, angry, surprised, sleepy]"}`
                        }]
                    }]
                };

                // Gọi trực tiếp Gemini API
                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(promptPayload)
                });

                const rawData = await response.json();
                statusBadge.innerText = "AI Core Active";
                statusBadge.style.color = "#00ff88";

                if (rawData.candidates && rawData.candidates[0].content.parts[0].text) {
                    let aiText = rawData.candidates[0].content.parts[0].text.trim();
                    
                    // Lọc bỏ dấu markdown json nếu AI lỡ trả về
                    aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(aiText);

                    // Đổi Emotion
                    setEmotion(parsedData.emotion);

                    // Chạy hiệu ứng gõ chữ Typewriter + nhún nhảy miệng
                    await animateTypewriterAndMouth(botBubble, parsedData.reply_text);
                } else {
                    throw new Error("Invalid Response");
                }

            } catch (error) {
                console.error(error);
                statusBadge.innerText = "Error";
                statusBadge.style.color = "#ff3838";
                setEmotion("sad");
                botBubble.innerText = "⚠️ Lỗi kết nối API! Hãy kiểm tra lại API Key Gemini của ông trong file index.html.";
            }
        }

        // ĐỘNG CƠ TYPEWRITER + NHÚN NHẢY MIỆNG PHỨC TẠP
        async function animateTypewriterAndMouth(element, fullText) {
            botCard.classList.add('talking');
            element.innerText = "";

            for (let i = 0; i < fullText.length; i++) {
                element.innerText += fullText[i];
                
                // Nhịp nảy miệng nhịp nhàng theo từng ký tự
                const mouthScale = (i % 2 === 0) ? 1.45 : 0.6;
                botCard.style.setProperty('--mouth-scale', mouthScale);

                chatHistory.scrollTop = chatHistory.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 35)); // Tốc độ đánh máy
            }

            botCard.classList.remove('talking');
            botCard.style.setProperty('--mouth-scale', 1);
        }
    </script>
</body>
</html>
