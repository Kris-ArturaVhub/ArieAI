<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arie AI Engine - Core System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #08090c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-screen {
            width: 100%;
            max-width: 410px;
            height: 100vh;
            height: 100dvh;
            max-height: 740px;
            background: #11131a;
            border-radius: 20px;
            border: 2px solid #222634;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.95);
        }

        @media (max-width: 480px) {
            .phone-screen {
                border-radius: 0;
                border: none;
                max-height: 100dvh;
            }
        }

        /* HEADER & AVATAR */
        .header-section {
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0a0b0f;
            border-bottom: 1px solid #1c1f2b;
            position: relative;
            flex-shrink: 0;
        }

        .bot-avatar-card {
            position: relative;
            width: 100%;
            height: 85px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #060709;
            --led-color1: #00f2fe;
            --led-color2: #4facfe;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bot-avatar-card::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 350px;
            background: linear-gradient(0deg, transparent, var(--led-color1), var(--led-color2));
            animation: rotateBorder 3.2s linear infinite;
        }

        .bot-face-inner {
            position: absolute;
            inset: 3px;
            background: #131622;
            border-radius: 11px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            z-index: 1;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .eyes-container {
            display: flex;
            gap: 24px;
            align-items: center;
            height: 18px;
            position: relative;
        }

        .eye {
            width: 16px;
            height: 16px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .mouth {
            width: 18px;
            height: 7px;
            background-color: var(--led-color1);
            border-radius: 0 0 18px 18px;
            transition: transform 0.08s ease, background-color 0.3s ease, height 0.2s ease, border-radius 0.3s ease;
            box-shadow: 0 0 6px var(--led-color1);
        }

        /* EMOTIONS MAP */
        .bot-avatar-card[data-emotion="normal"] { --led-color1: #00f2fe; --led-color2: #4facfe; }
        
        .bot-avatar-card[data-emotion="happy"] { --led-color1: #00ff88; --led-color2: #00b894; }
        .bot-avatar-card[data-emotion="happy"] .eye { height: 8px; border-radius: 8px 8px 0 0; }
        .bot-avatar-card[data-emotion="happy"] .mouth { border-radius: 0 0 18px 18px; height: 9px; width: 22px; }

        .bot-avatar-card[data-emotion="sleepy"] { --led-color1: #a29bfe; --led-color2: #6c5ce7; }
        .bot-avatar-card[data-emotion="sleepy"] .eye { width: 16px; height: 3px; border-radius: 2px; opacity: 0.6; transform: translateY(4px); }
        .bot-avatar-card[data-emotion="sleepy"] .mouth { width: 8px; height: 8px; border-radius: 50%; opacity: 0.8; }

        /* ANGRY - Đảo góc lông mày hướng xuống trung tâm */
        .bot-avatar-card[data-emotion="angry"] { --led-color1: #ff3838; --led-color2: #ff4d4d; }
        .bot-avatar-card[data-emotion="angry"] .eye { 
            height: 12px; 
            border-radius: 50% 50% 4px 4px; 
            transform: translateY(-2px);
        }
        .bot-avatar-card[data-emotion="angry"] .eye::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -4px;
            right: -4px;
            height: 10px;
            background: #131622;
            transform: rotate(25deg); /* Đổi hướng góc xuống */
        }
        .bot-avatar-card[data-emotion="angry"] .eye:last-child::before {
            transform: rotate(-25deg); /* Đổi hướng góc xuống */
        }
        .bot-avatar-card[data-emotion="angry"] .mouth { 
            border-radius: 12px 12px 4px 4px; 
            height: 6px; 
            width: 16px;
        }

        /* SAD - Nhận lại mắt và kiểu lông mày trước đó của Angry */
        .bot-avatar-card[data-emotion="sad"] { --led-color1: #4a69bd; --led-color2: #1e3799; }
        .bot-avatar-card[data-emotion="sad"] .eye { 
            height: 12px; 
            border-radius: 50% 50% 4px 4px; 
            transform: translateY(2px);
        }
        .bot-avatar-card[data-emotion="sad"] .eye::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -4px;
            right: -4px;
            height: 10px;
            background: #131622;
            transform: rotate(-25deg);
        }
        .bot-avatar-card[data-emotion="sad"] .eye:last-child::before {
            transform: rotate(25deg);
        }
        .bot-avatar-card[data-emotion="sad"] .mouth { 
            border-radius: 18px 18px 0 0; 
            height: 6px; 
            width: 16px;
            transform: translateY(2px);
        }

        .bot-avatar-card[data-emotion="surprised"] { --led-color1: #fdcb6e; --led-color2: #e17055; }
        .bot-avatar-card[data-emotion="surprised"] .eye { width: 18px; height: 18px; }
        .bot-avatar-card[data-emotion="surprised"] .mouth { border-radius: 50%; height: 14px; width: 12px; }

        .bot-avatar-card.talking .mouth {
            transform: scaleY(var(--mouth-scale, 1));
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            position: absolute;
            top: 6px;
            right: 10px;
            font-size: 8.5px;
            color: #00ff88;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 6px;
            border-radius: 8px;
            z-index: 2;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        /* LỊCH SỬ CHAT */
        .chat-history {
            flex: 1 1 0%;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-thumb { background: #222634; border-radius: 4px; }

        .msg-bubble {
            max-width: 85%;
            padding: 9px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0052d4, #4364f7);
            color: #ffffff;
            border-bottom-right-radius: 3px;
        }

        .msg-bot {
            align-self: flex-start;
            background: #1a1e2b;
            color: #e2e7f2;
            border: 1px solid #262b3c;
            border-bottom-left-radius: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* KHUNG CHỌN CẢM XÚC (POPOVER) */
        .emotions-popover {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: #131622;
            border-top: 1px solid #1c1f2b;
            overflow-x: auto;
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .emotions-popover.active {
            max-height: 50px;
            opacity: 1;
            padding: 8px 12px;
        }

        .emotions-popover::-webkit-scrollbar { display: none; }

        .emo-btn {
            background: #1c2030;
            border: 1px solid #2a2f45;
            color: #a0aec0;
            font-size: 11.5px;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .emo-btn:hover, .emo-btn.selected {
            background: #00f2fe;
            color: #000;
            border-color: #00f2fe;
            font-weight: 600;
        }

        /* KHUNG INPUT */
        .input-section {
            padding: 10px 12px;
            background: #0a0b0f;
            border-top: 1px solid #1c1f2b;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        .emo-toggle-btn {
            background: #161924;
            border: 1px solid #262a3a;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .emo-toggle-btn:active, .emo-toggle-btn.active {
            transform: scale(0.92);
            border-color: #00f2fe;
            background: #1c2235;
        }

        .chat-input {
            flex: 1;
            background: #161924;
            border: 1px solid #262a3a;
            border-radius: 20px;
            padding: 10px 14px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-input:focus {
            border-color: #00f2fe;
        }

        .send-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            opacity: 0;
            transform: scale(0.5) translateX(20px);
            width: 0px;
            padding: 0;
            margin-left: 0;
            overflow: hidden;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .send-btn.show {
            opacity: 1;
            transform: scale(1) translateX(0);
            width: 36px;
            margin-left: 2px;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        <!-- KHUNG 1: HEADER & AVATAR -->
        <div class="header-section">
            <div class="bot-avatar-card" id="botCard" data-emotion="normal" style="--mouth-scale: 1;">
                <span class="status-badge" id="statusBadge">AI Core Active</span>
                <div class="bot-face-inner">
                    <div class="eyes-container">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
        </div>

        <!-- KHUNG 2: CHAT HISTORY -->
        <div class="chat-history" id="chatHistory">
            <div class="msg-bubble msg-bot">⚡ Đã đảo góc lông mày cho Angry và chuyển phom mắt/lông mày sang cho Sad!</div>
        </div>

        <!-- POPUP BẢNG CẢM XÚC -->
        <div class="emotions-popover" id="emotionsPopover">
            <button class="emo-btn selected" onclick="selectEmotion('normal', this)">Normal</button>
            <button class="emo-btn" onclick="selectEmotion('happy', this)">Happy</button>
            <button class="emo-btn" onclick="selectEmotion('sleepy', this)">Sleepy</button>
            <button class="emo-btn" onclick="selectEmotion('angry', this)">Angry</button>
            <button class="emo-btn" onclick="selectEmotion('sad', this)">Sad</button>
            <button class="emo-btn" onclick="selectEmotion('surprised', this)">Surprised</button>
        </div>

        <!-- KHUNG 3: INPUT SECTION -->
        <div class="input-section">
            <button class="emo-toggle-btn" id="emoToggleBtn" onclick="toggleEmotionsPopover()">😀</button>
            <input type="text" id="userInput" class="chat-input" placeholder="Nhập tin nhắn..." oninput="handleInputChange()" onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        const botCard = document.getElementById('botCard');
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusBadge = document.getElementById('statusBadge');
        const emotionsPopover = document.getElementById('emotionsPopover');
        const emoToggleBtn = document.getElementById('emoToggleBtn');

        function toggleEmotionsPopover() {
            emotionsPopover.classList.toggle('active');
            emoToggleBtn.classList.toggle('active');
        }

        function selectEmotion(emo, btnElement) {
            botCard.setAttribute('data-emotion', emo);
            document.querySelectorAll('.emo-btn').forEach(b => b.classList.remove('selected'));
            if(btnElement) btnElement.classList.add('selected');
        }

        function handleInputChange() {
            if (userInput.value.trim().length > 0) {
                sendBtn.classList.add('show');
            } else {
                sendBtn.classList.remove('show');
            }
        }

        async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    sendBtn.classList.remove('show');
    emotionsPopover.classList.remove('active');
    emoToggleBtn.classList.remove('active');

    // Thêm tin nhắn của User vào giao diện...
    const userBubble = document.createElement('div');
    userBubble.className = 'msg-bubble msg-user';
    userBubble.innerText = text;
    chatHistory.appendChild(userBubble);

    const botBubble = document.createElement('div');
    botBubble.className = 'msg-bubble msg-bot';
    botBubble.innerText = '...';
    chatHistory.appendChild(botBubble);

    statusBadge.innerText = "Thinking...";
    statusBadge.style.color = "#fdcb6e";

    try {
        // GỌI ĐẾN BACKEND TRUNG GIAN (Không chứa API Key)
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: text })
        });

        const data = await response.json();
        statusBadge.innerText = "AI Core Active";
        statusBadge.style.color = "#00ff88";

        if (data.text) {
            let aiText = data.text.trim().replace(/```json/g, '').replace(/```/g, '').trim();
            const parsedData = JSON.parse(aiText);

            selectEmotion(parsedData.emotion || 'normal');
            await animateTypewriterAndMouth(botBubble, parsedData.reply_text);
        } else {
            throw new Error("Invalid response format");
        }

    } catch (error) {
        console.error(error);
        statusBadge.innerText = "Error";
        statusBadge.style.color = "#ff3838";
        selectEmotion('sad');
        botBubble.innerText = "⚠️ Lỗi xử lý từ máy chủ!";
    }
        }
        

            
        async function animateTypewriterAndMouth(element, fullText) {
            botCard.classList.add('talking');
            element.innerText = "";

            for (let i = 0; i < fullText.length; i++) {
                element.innerText += fullText[i];
                const mouthScale = (i % 2 === 0) ? 1.45 : 0.6;
                botCard.style.setProperty('--mouth-scale', mouthScale);

                chatHistory.scrollTop = chatHistory.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 30));
            }

            botCard.classList.remove('talking');
            botCard.style.setProperty('--mouth-scale', 1);
        }
    </script>
</body>
                                                                                               </html>
</html>
