<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arie - mini chatbot</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #08090c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-screen {
            width: 100%;
            max-width: 410px;
            height: 100vh;
            height: 100dvh;
            max-height: 740px;
            background: #11131a;
            border-radius: 20px;
            border: 2px solid #222634;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.95);
        }

        @media (max-width: 480px) {
            .phone-screen {
                border-radius: 0;
                border: none;
                max-height: 100dvh;
            }
        }

        /* HEADER & AVATAR */
        .header-section {
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0a0b0f;
            border-bottom: 1px solid #1c1f2b;
            position: relative;
            flex-shrink: 0;
        }

        .bot-avatar-card {
            position: relative;
            width: 100%;
            height: 85px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #060709;
            --led-color1: #00f2fe;
            --led-color2: #4facfe;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bot-avatar-card::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 350px;
            background: linear-gradient(0deg, transparent, var(--led-color1), var(--led-color2));
            animation: rotateBorder 3.2s linear infinite;
        }

        .bot-face-inner {
            position: absolute;
            inset: 3px;
            background: #131622;
            border-radius: 11px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            z-index: 1;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .eyes-container {
            display: flex;
            gap: 24px;
            align-items: center;
            height: 18px;
        }

        .eye {
            width: 16px;
            height: 16px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mouth {
            width: 18px;
            height: 7px;
            background-color: var(--led-color1);
            border-radius: 0 0 18px 18px;
            transition: transform 0.08s ease, background-color 0.3s ease, height 0.2s ease;
            box-shadow: 0 0 6px var(--led-color1);
        }

        /* EMOTIONS MAP */
        .bot-avatar-card[data-emotion="normal"] { --led-color1: #00f2fe; --led-color2: #4facfe; }
        .bot-avatar-card[data-emotion="happy"] { --led-color1: #00ff88; --led-color2: #00b894; }
        .bot-avatar-card[data-emotion="happy"] .eye { height: 8px; border-radius: 8px 8px 0 0; }

        .bot-avatar-card[data-emotion="sleepy"] { --led-color1: #a29bfe; --led-color2: #6c5ce7; }
        .bot-avatar-card[data-emotion="sleepy"] .eye { height: 4px; border-radius: 2px; opacity: 0.7; }

        .bot-avatar-card[data-emotion="angry"] { --led-color1: #ff3838; --led-color2: #ff4d4d; }
        .bot-avatar-card[data-emotion="angry"] .eye { height: 6px; transform: rotate(18deg); }

        .bot-avatar-card[data-emotion="sad"] { --led-color1: #4a69bd; --led-color2: #1e3799; }
        .bot-avatar-card[data-emotion="sad"] .eye { height: 6px; border-radius: 0 0 6px 6px; }

        .bot-avatar-card[data-emotion="surprised"] { --led-color1: #fdcb6e; --led-color2: #e17055; }
        .bot-avatar-card[data-emotion="surprised"] .eye { width: 18px; height: 18px; }
        .bot-avatar-card[data-emotion="surprised"] .mouth { border-radius: 50%; height: 12px; width: 12px; }

        .bot-avatar-card.talking .mouth {
            transform: scaleY(var(--mouth-scale, 1));
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            position: absolute;
            top: 6px;
            right: 10px;
            font-size: 8.5px;
            color: #00ff88;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 6px;
            border-radius: 8px;
            z-index: 2;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        /* THANH CHỌN CẢM XÚC (EMOTIONS BAR) */
        .emotions-bar {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            overflow-x: auto;
            width: 100%;
            padding-bottom: 2px;
        }
        .emotions-bar::-webkit-scrollbar { display: none; }

        .emo-btn {
            background: #161924;
            border: 1px solid #262a3a;
            color: #a0aec0;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .emo-btn:hover, .emo-btn.active {
            background: #00f2fe;
            color: #000;
            border-color: #00f2fe;
            font-weight: 600;
        }

        /* LỊCH SỬ CHAT */
        .chat-history {
            flex: 1 1 0%;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-thumb { background: #222634; border-radius: 4px; }

        .msg-bubble {
            max-width: 85%;
            padding: 9px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0052d4, #4364f7);
            color: #ffffff;
            border-bottom-right-radius: 3px;
        }

        .msg-bot {
            align-self: flex-start;
            background: #1a1e2b;
            color: #e2e7f2;
            border: 1px solid #262b3c;
            border-bottom-left-radius: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* KHUNG INPUT & CƠ CHẾ TRƯỢT NÚT GỬI THÔNG MINH */
        .input-section {
            padding: 10px 12px;
            background: #0a0b0f;
            border-top: 1px solid #1c1f2b;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            background: #161924;
            border: 1px solid #262a3a;
            border-radius: 20px;
            padding: 10px 14px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-input:focus {
            border-color: #00f2fe;
        }

        /* Nút gửi có hiệu ứng ẩn/hiện & trượt mượt mà */
        .send-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            
            /* Trạng thái ẩn mặc định khi input trống */
            opacity: 0;
            transform: scale(0.5) translateX(20px);
            width: 0px;
            padding: 0;
            margin-left: 0;
            overflow: hidden;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Khi có class .show, nút trượt ra và chiếm chỗ */
        .send-btn.show {
            opacity: 1;
            transform: scale(1) translateX(0);
            width: 36px;
            margin-left: 2px;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        <div class="header-section">
            <div class="bot-avatar-card" id="botCard" data-emotion="normal" style="--mouth-scale: 1;">
                <span class="status-badge" id="statusBadge">AI Core Active</span>
                <div class="bot-face-inner">
                    <div class="eyes-container">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>

            <!-- NÚT CHỌN CẢM XÚC NHANH (EMOTIONS BAR) -->
            <div class="emotions-bar">
                <button class="emo-btn active" onclick="changeEmotion('normal', this)">Normal</button>
                <button class="emo-btn" onclick="changeEmotion('happy', this)">Happy</button>
                <button class="emo-btn" onclick="changeEmotion('sleepy', this)">Sleepy</button>
                <button class="emo-btn" onclick="changeEmotion('angry', this)">Angry</button>
                <button class="emo-btn" onclick="changeEmotion('sad', this)">Sad</button>
                <button class="emo-btn" onclick="changeEmotion('surprised', this)">Surprised</button>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="msg-bubble msg-bot">⚡ Hệ thống Arie AI Core đã sẵn sàng! Bạn có thể gõ tin nhắn hoặc test nút cảm xúc ở trên nhé.</div>
        </div>

        <div class="input-section">
            <input type="text" id="userInput" class="chat-input" placeholder="Nhập tin nhắn..." oninput="handleInputChange()" onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        const botCard = document.getElementById('botCard');
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusBadge = document.getElementById('statusBadge');

        // Hàm đổi cảm xúc thủ công bằng thanh công cụ
        function changeEmotion(emo, btnElement) {
            botCard.setAttribute('data-emotion', emo);
            document.querySelectorAll('.emo-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
        }

        // Kiểm soát ẩn/hiện nút gửi dựa vào ký tự trong ô input
        function handleInputChange() {
            const val = userInput.value;
            if (val.trim().length > 0) {
                sendBtn.classList.add('show');
            } else {
                sendBtn.classList.remove('show');
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Xóa nội dung input và ẩn nút gửi ngay lập tức
            userInput.value = '';
            sendBtn.classList.remove('show');

            const userBubble = document.createElement('div');
            userBubble.className = 'msg-bubble msg-user';
            userBubble.innerText = text;
            chatHistory.appendChild(userBubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            const botBubble = document.createElement('div');
            botBubble.className = 'msg-bubble msg-bot';
            botBubble.innerText = '...';
            chatHistory.appendChild(botBubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            statusBadge.innerText = "Thinking...";
            statusBadge.style.color = "#fdcb6e";

            try {
                const promptPayload = {
                    contents: [{
                        parts: [{
                            text: `Bạn là Arie AI. Phản hồi ngắn gọn: "${text}".
                            BẮT BUỘC trả về định dạng JSON thuần không codeblock:
                            {"reply_text": "câu trả lời", "emotion": "chọn 1 trong [normal, happy, sad, angry, surprised, sleepy]"}`
                        }]
                    }]
                };

                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(promptPayload)
                });

                const rawData = await response.json();
                statusBadge.innerText = "AI Core Active";
                statusBadge.style.color = "#00ff88";

                if (rawData.candidates && rawData.candidates[0].content.parts[0].text) {
                    let aiText = rawData.candidates[0].content.parts[0].text.trim();
                    aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(aiText);

                    botCard.setAttribute('data-emotion', parsedData.emotion || 'normal');
                    await animateTypewriterAndMouth(botBubble, parsedData.reply_text);
                } else {
                    throw new Error("Invalid Response");
                }

            } catch (error) {
                console.error(error);
                statusBadge.innerText = "Error";
                statusBadge.style.color = "#ff3838";
                botCard.setAttribute('data-emotion', 'sad');
                botBubble.innerText = "⚠️ Lỗi kết nối API! Vui lòng kiểm tra lại Key.";
            }
        }

        async function animateTypewriterAndMouth(element, fullText) {
            botCard.classList.add('talking');
            element.innerText = "";

            for (let i = 0; i < fullText.length; i++) {
                element.innerText += fullText[i];
                const mouthScale = (i % 2 === 0) ? 1.45 : 0.6;
                botCard.style.setProperty('--mouth-scale', mouthScale);

                chatHistory.scrollTop = chatHistory.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 30));
            }

            botCard.classList.remove('talking');
            botCard.style.setProperty('--mouth-scale', 1);
        }
    </script>
</body>
    </html>
