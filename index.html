<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arie AI Engine - Core System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Cấm toàn bộ trang web bị cuộn trượt */
            background-color: #08090c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* KHUNG ĐIỆN THOẠI - DÙNG 100dvh ĐỂ CHỐNG BỊ LÚN BỞI THANH TRÌNH DUYỆT MOBILE */
        .phone-screen {
            width: 100%;
            max-width: 410px;
            height: 100vh;
            height: 100dvh; /* Tự động co giãn vừa khít màn hình hiển thị */
            max-height: 720px;
            background: #11131a;
            border-radius: 20px;
            border: 2px solid #222634;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.95);
        }

        @media (max-width: 480px) {
            .phone-screen {
                border-radius: 0;
                border: none;
                max-height: 100dvh;
            }
        }

        /* HEADER AVATAR - CỐ ĐỊNH TRÊN CÙNG */
        .header-section {
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0a0b0f;
            border-bottom: 1px solid #1c1f2b;
            position: relative;
            flex-shrink: 0; /* Cấm header bị co bóp */
        }

        .bot-avatar-card {
            position: relative;
            width: 100%;
            height: 90px; /* Thu gọn chiều cao tối đa */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #060709;
            --led-color1: #00f2fe;
            --led-color2: #4facfe;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bot-avatar-card::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 350px;
            background: linear-gradient(0deg, transparent, var(--led-color1), var(--led-color2));
            animation: rotateBorder 3.2s linear infinite;
        }

        .bot-face-inner {
            position: absolute;
            inset: 3px;
            background: #131622;
            border-radius: 13px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            z-index: 1;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .eyes-container {
            display: flex;
            gap: 26px;
            align-items: center;
            height: 20px;
        }

        .eye {
            width: 18px;
            height: 18px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mouth {
            width: 20px;
            height: 8px;
            background-color: var(--led-color1);
            border-radius: 0 0 20px 20px;
            transition: transform 0.08s ease, background-color 0.3s ease, height 0.2s ease;
            box-shadow: 0 0 6px var(--led-color1);
        }

        /* EMOTIONS */
        .bot-avatar-card[data-emotion="normal"] { --led-color1: #00f2fe; --led-color2: #4facfe; }
        .bot-avatar-card[data-emotion="happy"] { --led-color1: #00ff88; --led-color2: #00b894; }
        .bot-avatar-card[data-emotion="happy"] .eye { height: 9px; border-radius: 9px 9px 0 0; }

        .bot-avatar-card[data-emotion="sleepy"] { --led-color1: #a29bfe; --led-color2: #6c5ce7; }
        .bot-avatar-card[data-emotion="sleepy"] .eye { height: 4px; border-radius: 2px; opacity: 0.7; }

        .bot-avatar-card[data-emotion="angry"] { --led-color1: #ff3838; --led-color2: #ff4d4d; }
        .bot-avatar-card[data-emotion="angry"] .eye { height: 6px; transform: rotate(18deg); }

        .bot-avatar-card[data-emotion="sad"] { --led-color1: #4a69bd; --led-color2: #1e3799; }
        .bot-avatar-card[data-emotion="sad"] .eye { height: 7px; border-radius: 0 0 7px 7px; }

        .bot-avatar-card[data-emotion="surprised"] { --led-color1: #fdcb6e; --led-color2: #e17055; }
        .bot-avatar-card[data-emotion="surprised"] .eye { width: 20px; height: 20px; }
        .bot-avatar-card[data-emotion="surprised"] .mouth { border-radius: 50%; height: 14px; width: 14px; }

        .bot-avatar-card.talking .mouth {
            transform: scaleY(var(--mouth-scale, 1));
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* LỊCH SỬ CHAT - TỰ CO GIÃN THEO KÍCH THƯỚC CÒN LẠI */
        .chat-history {
            flex: 1 1 0%; /* Ép flex co giãn chính xác trong khoảng trống còn lại */
            padding: 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0; /* Bắt buộc để flexbox overflow làm việc đúng */
        }

        .chat-history::-webkit-scrollbar {
            width: 4px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: #222634;
            border-radius: 4px;
        }

        .msg-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.45;
            word-wrap: break-word;
            animation: fadeIn 0.25s cubic-bezier(0, 0, 0.2, 1);
        }

        .msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0052d4, #4364f7);
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .msg-bot {
            align-self: flex-start;
            background: #1a1e2b;
            color: #e2e7f2;
            border: 1px solid #262b3c;
            border-bottom-left-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* KHUNG INPUT - NEO CHẮC CHẮN ĐÁY MÀN HÌNH */
        .input-section {
            padding: 10px 14px;
            background: #0a0b0f;
            border-top: 1px solid #1c1f2b;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0; /* Tuyệt đối không cho bị bóp nghẹt */
        }

        .chat-input {
            flex: 1;
            background: #161924;
            border: 1px solid #262a3a;
            border-radius: 22px;
            padding: 10px 16px;
            color: #ffffff;
            font-size: 13.5px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #00f2fe;
        }

        .send-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .status-badge {
            position: absolute;
            top: 6px;
            right: 12px;
            font-size: 9px;
            color: #00ff88;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 7px;
            border-radius: 10px;
            z-index: 2;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        <div class="header-section">
            <div class="bot-avatar-card" id="botCard" data-emotion="normal" style="--mouth-scale: 1;">
                <span class="status-badge" id="statusBadge">AI Core Active</span>
                <div class="bot-face-inner">
                    <div class="eyes-container">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="msg-bubble msg-bot">⚡ Hệ thống Arie AI Core đã sẵn sàng! Chào bạn, tớ có thể giúp gì nào?</div>
        </div>

        <div class="input-section">
            <input type="text" id="userInput" class="chat-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6Lj6-mI45qjlbgwdmsSikqkeVF_bamxe9sMsPZJu22zAw";
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        const botCard = document.getElementById('botCard');
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const statusBadge = document.getElementById('statusBadge');

        function setEmotion(emo) {
            botCard.setAttribute('data-emotion', emo || 'normal');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const userBubble = document.createElement('div');
            userBubble.className = 'msg-bubble msg-user';
            userBubble.innerText = text;
            chatHistory.appendChild(userBubble);
            userInput.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            const botBubble = document.createElement('div');
            botBubble.className = 'msg-bubble msg-bot';
            botBubble.innerText = '...';
            chatHistory.appendChild(botBubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            statusBadge.innerText = "Thinking...";
            statusBadge.style.color = "#fdcb6e";

            try {
                const promptPayload = {
                    contents: [{
                        parts: [{
                            text: `Bạn là Arie AI. Phản hồi ngắn gọn: "${text}".
                            BẮT BUỘC trả về định dạng JSON thuần không codeblock:
                            {"reply_text": "câu trả lời", "emotion": "chọn 1 trong [normal, happy, sad, angry, surprised, sleepy]"}`
                        }]
                    }]
                };

                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(promptPayload)
                });

                const rawData = await response.json();
                statusBadge.innerText = "AI Core Active";
                statusBadge.style.color = "#00ff88";

                if (rawData.candidates && rawData.candidates[0].content.parts[0].text) {
                    let aiText = rawData.candidates[0].content.parts[0].text.trim();
                    aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(aiText);

                    setEmotion(parsedData.emotion);
                    await animateTypewriterAndMouth(botBubble, parsedData.reply_text);
                } else {
                    throw new Error("Invalid Response");
                }

            } catch (error) {
                console.error(error);
                statusBadge.innerText = "Error";
                statusBadge.style.color = "#ff3838";
                setEmotion("sad");
                botBubble.innerText = "⚠️ Lỗi kết nối API! Vui lòng kiểm tra lại Key.";
            }
        }

        async function animateTypewriterAndMouth(element, fullText) {
            botCard.classList.add('talking');
            element.innerText = "";

            for (let i = 0; i < fullText.length; i++) {
                element.innerText += fullText[i];
                const mouthScale = (i % 2 === 0) ? 1.45 : 0.6;
                botCard.style.setProperty('--mouth-scale', mouthScale);

                chatHistory.scrollTop = chatHistory.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 35));
            }

            botCard.classList.remove('talking');
            botCard.style.setProperty('--mouth-scale', 1);
        }
    </script>
</body>
</html>
